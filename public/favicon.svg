<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle matching the navbar logo -->
  <circle cx="16" cy="16" r="14" fill="#0f172a" stroke="#0ea5e9" stroke-width="1.5"/>
  
  <!-- Inner gradient circle -->
  <circle cx="16" cy="16" r="11" fill="url(#gradient)" opacity="0.8"/>
  
  <!-- Sentivya logo paths -->
  <path
    d="M8 20c4-8 8-12 16-12s12 4 20 16"
    stroke="#0f172a"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    transform="scale(0.8) translate(4, 2)"
  />
  <path
    d="M12 26c2.4-3.2 4.8-4.8 8-4.8s5.6 1.6 8 4.8"
    stroke="#0f172a"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.7"
    transform="scale(0.8) translate(4, 2)"
  />
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
